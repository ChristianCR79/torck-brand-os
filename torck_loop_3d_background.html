<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>torck - Loop 3D Background</title>
<style>
  @font-face {
    font-family: "Inter";
    src: url("Fonts/Inter_28pt-Regular.ttf") format("truetype");
    font-weight: 400;
  }

  @font-face {
    font-family: "Inter";
    src: url("Fonts/Inter_28pt-Black.ttf") format("truetype");
    font-weight: 900;
  }

  @font-face {
    font-family: "Space Mono";
    src: url("Fonts/SpaceMono-Regular.ttf") format("truetype");
    font-weight: 400;
  }

  :root {
    --blue: #415578;
    --ink: #172033;
    --yellow: #f0fa28;
    --paper: #f5f0eb;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    overflow: hidden;
  }

  body {
    font-family: "Inter", system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  body.theme-slate {
    background: var(--blue);
  }

  .hero {
    min-height: 100svh;
    position: relative;
    isolation: isolate;
    display: grid;
    place-items: center;
    padding: clamp(18px, 3vw, 42px);
    overflow: hidden;
  }

  .background {
    position: absolute;
    inset: 0;
    z-index: -2;
    perspective: 1300px;
    overflow: hidden;
    background: var(--paper);
    transition: background 320ms ease;
  }

  body.theme-slate .background {
    background: var(--blue);
  }

  .loop-stage {
    position: absolute;
    left: 50%;
    top: 47%;
    width: min(1220px, 118vw);
    aspect-ratio: 220.48 / 142.59;
    transform: translate(-50%, -50%);
    transform-style: preserve-3d;
    cursor: grab;
    user-select: none;
    touch-action: none;
  }

  .loop-stage:active {
    cursor: grabbing;
  }

  .loop-object {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    animation: torqueTurn 14000ms cubic-bezier(.45, 0, .25, 1) infinite alternate;
    will-change: transform;
  }

  .loop-layer {
    position: absolute;
    inset: 0;
    overflow: visible;
    transform-style: preserve-3d;
  }

  .loop-layer svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }

  .loop-layer path {
    fill: var(--blue);
    stroke: transparent;
    stroke-width: 0;
    vector-effect: non-scaling-stroke;
    transition: fill 260ms ease, stroke 260ms ease, opacity 260ms ease;
  }

  .loop-layer.side path {
    fill: #2f3f5d;
  }

  .loop-layer.front path {
    fill: rgba(65, 85, 120, 0.9);
  }

  body.theme-slate .loop-layer path {
    fill: var(--yellow);
  }

  body.theme-slate .loop-layer.side path {
    fill: #c7d30d;
  }

  body.theme-slate .loop-layer.front path {
    fill: rgba(240, 250, 40, 0.94);
  }

  body.mode-outline .loop-layer {
    opacity: 0 !important;
  }

  body.mode-outline .loop-layer.side path {
    fill: transparent;
    stroke: rgba(23, 32, 51, 0.34);
    stroke-width: 1.25;
  }

  body.mode-outline .loop-layer.wire {
    opacity: 1 !important;
  }

  body.mode-outline .loop-layer.back path {
    stroke: rgba(23, 32, 51, 0.28);
    stroke-width: 1.15;
  }

  body.mode-outline .loop-layer.front path {
    fill: transparent;
    stroke: var(--ink);
    stroke-width: 1.55;
  }

  body.mode-outline .loop-layer.front {
    opacity: 1 !important;
  }

  body.theme-slate.mode-outline .loop-layer.side path {
    stroke: rgba(240, 250, 40, 0.34);
  }

  body.theme-slate.mode-outline .loop-layer.back path {
    stroke: rgba(240, 250, 40, 0.28);
  }

  body.theme-slate.mode-outline .loop-layer.front path {
    stroke: var(--yellow);
  }

  .controls {
    position: absolute;
    left: 50%;
    bottom: clamp(18px, 3vw, 34px);
    z-index: 3;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .color-controls {
    display: flex;
    gap: 10px;
  }

  .loop-color-controls {
    display: none;
    gap: 10px;
  }

  body.theme-slate .loop-color-controls {
    display: flex;
  }

  button {
    width: 44px;
    height: 44px;
    border: 1px solid rgba(65, 85, 120, 0.34);
    border-radius: 999px;
    background: rgba(245, 240, 235, 0.52);
    color: var(--blue);
    display: grid;
    place-items: center;
    cursor: pointer;
    box-shadow: none;
    transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
  }

  .mode-button {
    width: auto;
    min-width: 112px;
    border-radius: 6px;
    margin-left: 4px;
    padding: 0 14px;
    font: 400 12px/1 "Space Mono", monospace;
    text-transform: uppercase;
  }

  button:hover {
    transform: translateY(-2px);
    border-color: currentColor;
  }

  button[aria-pressed="true"] {
    border-color: currentColor;
    background: rgba(245, 240, 235, 0.62);
  }

  body.theme-slate button {
    border-color: rgba(23, 32, 51, 0.28);
    color: var(--ink);
    background: rgba(245, 240, 235, 0.52);
  }

  .mode-button[aria-pressed="true"] {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  body.theme-slate .mode-button[aria-pressed="true"] {
    background: var(--yellow);
    color: var(--ink);
    border-color: var(--yellow);
  }

  .swatch {
    width: 20px;
    height: 20px;
    border-radius: 999px;
    border: 1px solid rgba(23, 32, 51, 0.24);
  }

  .swatch.paper {
    background: var(--paper);
  }

  .swatch.slate {
    background: var(--blue);
  }

  .swatch.cream {
    background: var(--paper);
  }

  .swatch.yellow {
    background: var(--yellow);
  }

  .icon {
    width: 22px;
    height: 22px;
    display: block;
  }

  body.theme-slate.loop-cream .loop-layer path {
    fill: var(--paper);
  }

  body.theme-slate.loop-cream .loop-layer.side path {
    fill: #d6d0c9;
  }

  body.theme-slate.loop-cream .loop-layer.front path {
    fill: rgba(245, 240, 235, 0.94);
  }

  body.theme-slate.loop-cream.mode-outline .loop-layer.side path {
    stroke: rgba(245, 240, 235, 0.36);
  }

  body.theme-slate.loop-cream.mode-outline .loop-layer.back path {
    stroke: rgba(245, 240, 235, 0.28);
  }

  body.theme-slate.loop-cream.mode-outline .loop-layer.front path {
    stroke: var(--paper);
  }

  body.mode-outline .loop-layer path,
  body.theme-slate.loop-cream.mode-outline .loop-layer path {
    fill: transparent;
  }

  @keyframes torqueTurn {
    0% { transform: rotateX(60deg) rotateY(-25deg) rotateZ(-3deg); }
    45% { transform: rotateX(54deg) rotateY(10deg) rotateZ(1deg); }
    100% { transform: rotateX(63deg) rotateY(31deg) rotateZ(4deg); }
  }

  @media (max-width: 720px) {
    .hero {
      padding: 18px;
    }

    .loop-stage {
      left: 50%;
      top: 46%;
      width: 168vw;
    }

    .controls {
      bottom: 18px;
    }
  }
</style>
</head>
<body>
  <main class="hero">
    <div class="background" aria-hidden="true">
      <div class="loop-stage" id="loopStage">
        <div class="loop-object" id="loopObject"></div>
      </div>
    </div>

    <div class="controls" aria-label="Loop Darstellung">
      <div class="color-controls" aria-label="Hintergrundfarbe">
        <button type="button" data-theme="paper" aria-label="Cream Hintergrund" aria-pressed="true">
          <span class="swatch paper"></span>
        </button>
        <button type="button" data-theme="slate" aria-label="Slate Blue Hintergrund" aria-pressed="false">
          <span class="swatch slate"></span>
        </button>
      </div>
      <div class="loop-color-controls" aria-label="Loop Farbe auf blauem Hintergrund">
        <button type="button" data-loop-color="yellow" aria-label="Electric Yellow Loop" aria-pressed="true">
          <span class="swatch yellow"></span>
        </button>
        <button type="button" data-loop-color="cream" aria-label="Cream Loop" aria-pressed="false">
          <span class="swatch cream"></span>
        </button>
      </div>
      <button class="mode-button" type="button" data-mode-toggle aria-label="Filled oder Outline wechseln" aria-pressed="false">
        <span data-mode-label>Outline</span>
      </button>
    </div>
  </main>

<script>
(() => {
  const loopObject = document.getElementById("loopObject");
  const loopStage = document.getElementById("loopStage");
  const path = "M165.45,26.08C152.38,10.16,132.55,0,110.35,0,70.99,0,39.08,31.91,39.08,71.27c0,.02,0,.04,0,.05h-.1C38.99,92.82,21.5,110.31,0,110.31v32.28c22.22,0,42.1-10.22,55.17-26.21,13.07,15.97,32.93,26.16,55.17,26.16,39.36,0,71.27-31.91,71.27-71.27,0-.78-.02-1.56-.04-2.33,1.24-20.39,18.21-36.6,38.91-36.6V.05c-22.13,0-41.94,10.14-55.02,26.02ZM110.35,110.13c-21.46,0-38.86-17.4-38.86-38.86s17.4-38.86,38.86-38.86,38.86,17.4,38.86,38.86-17.4,38.86-38.86,38.86Z";
  const depth = 68;
  const layers = 30;
  let drag = false;
  let lastX = 0;
  let lastY = 0;
  let rx = 58;
  let ry = -20;
  let rz = -2;

  function svgLayer(className, z, opacity) {
    const layer = document.createElement("div");
    layer.className = `loop-layer ${className}`;
    layer.style.transform = `translateZ(${z}px)`;
    layer.style.opacity = opacity;
    layer.innerHTML = `
      <svg viewBox="0 0 220.48 142.59" role="img" aria-label="Torck Loop">
        <path d="${path}"></path>
      </svg>
    `;
    return layer;
  }

  for (let i = 0; i < layers; i += 1) {
    const t = i / (layers - 1);
    const z = -depth / 2 + depth * t;
    const opacity = 0.26 + t * 0.46;
    const wireClass = i === 0 ? " wire back" : (i % 8 === 0 ? " wire" : "");
    loopObject.appendChild(svgLayer(`side${wireClass}`, z, opacity.toFixed(3)));
  }
  loopObject.appendChild(svgLayer("front", depth / 2 + 1, 1));

  function applyDragTransform() {
    loopObject.style.animation = "none";
    loopObject.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg)`;
  }

  loopStage.addEventListener("pointerdown", event => {
    drag = true;
    lastX = event.clientX;
    lastY = event.clientY;
    loopStage.setPointerCapture(event.pointerId);
    applyDragTransform();
  });

  loopStage.addEventListener("pointermove", event => {
    if (!drag) return;
    const dx = event.clientX - lastX;
    const dy = event.clientY - lastY;
    lastX = event.clientX;
    lastY = event.clientY;
    ry += dx * 0.32;
    rx -= dy * 0.22;
    rx = Math.max(18, Math.min(78, rx));
    applyDragTransform();
  });

  loopStage.addEventListener("pointerup", event => {
    drag = false;
    try {
      loopStage.releasePointerCapture(event.pointerId);
    } catch (error) {
      // Pointer capture may already be released.
    }
  });

  const uiState = {
    theme: "paper",
    mode: "fill",
    loopColor: "yellow"
  };

  const themeButtons = document.querySelectorAll("[data-theme]");
  const loopColorButtons = document.querySelectorAll("[data-loop-color]");
  const modeButton = document.querySelector("[data-mode-toggle]");
  const modeLabel = document.querySelector("[data-mode-label]");

  function syncUi() {
    document.body.classList.toggle("theme-slate", uiState.theme === "slate");
    document.body.classList.toggle("loop-cream", uiState.theme === "slate" && uiState.loopColor === "cream");
    document.body.classList.toggle("mode-outline", uiState.mode === "outline");

    themeButtons.forEach(button => {
      button.setAttribute("aria-pressed", String(button.dataset.theme === uiState.theme));
    });

    loopColorButtons.forEach(button => {
      button.setAttribute("aria-pressed", String(button.dataset.loopColor === uiState.loopColor));
    });

    modeButton.setAttribute("aria-pressed", String(uiState.mode === "outline"));
    modeLabel.textContent = uiState.mode === "outline" ? "Fill" : "Outline";
  }

  themeButtons.forEach(button => {
    button.addEventListener("click", () => {
      uiState.theme = button.dataset.theme;
      if (uiState.theme !== "slate") uiState.loopColor = "yellow";
      syncUi();
    });
  });

  loopColorButtons.forEach(button => {
    button.addEventListener("click", () => {
      uiState.loopColor = button.dataset.loopColor;
      uiState.theme = "slate";
      syncUi();
    });
  });

  modeButton.addEventListener("click", () => {
    uiState.mode = uiState.mode === "outline" ? "fill" : "outline";
    syncUi();
  });

  syncUi();
})();
</script>
</body>
</html>
